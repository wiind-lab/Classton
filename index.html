      <button onclick="showTab('group')"       class="tab-btn flex-1 py-2 hover:bg-slate-50 transition flex flex-col items-center justify-center gap-1" data-tab="group"><span>👥</span><span class="text-xs font-bold leading-tight">모둠</span></button>
      <button onclick="showTab('seatHistory')" class="tab-btn flex-1 py-2 hover:bg-slate-50 transition flex flex-col items-center justify-center gap-1" data-tab="seatHistory"><span>🗂️</span><span class="text-xs font-bold leading-tight text-center">자리변경<br>기록</span></button>
      <button onclick="showTab('history')"     class="tab-btn flex-1 py-2 hover:bg-slate-50 transition flex flex-col items-center justify-center gap-1" data-tab="history"><span>📋</span><span class="text-xs font-bold leading-tight text-center">다했어요<br>기록</span></button>
      <button onclick="openSettingsWithPassword()" class="tab-btn flex-1 py-2 hover:bg-slate-50 transition flex flex-col items-center justify-center gap-1" data-tab="settings"><span>🔒</span><span class="text-xs font-bold leading-tight text-center">담임<br>메뉴</span></button>
      <button onclick="showTab('manual')"      class="tab-btn flex-1 py-2 hover:bg-slate-50 transition flex flex-col items-center justify-center gap-1" data-tab="manual"><span>📖</span><span class="text-xs font-bold leading-tight text-center">사용<br>안내</span></button>
    </div>
    <div class="flex-1 overflow-y-auto p-3" id="sideContent"></div>
  </div>

</div><!-- /flex -->

<!-- ===== [v9-B.1] 독립 뽑기창 ===== -->
<div id="pickerPanel"
  class="w-[30%] bg-white border-l border-slate-200 flex flex-col transition-transform duration-300 fixed right-0 top-0 h-full z-40"
  style="transform: translateX(100%);">
  <!-- 헤더 (v9-B.2: X 버튼 제거 — 뽑기메뉴 버튼으로 닫기) -->
  <div class="flex items-center px-3 py-2 border-b bg-amber-50">
    <span class="font-bold text-sm text-amber-700">📢 뽑기 메뉴</span>
  </div>
  <div class="flex-1 overflow-y-auto p-3" id="pickerContent"></div>
</div>

<!-- ===== [5차] 1인1역 등록 팝업 ===== -->
<div id="rolePopupOverlay" class="role-popup-overlay" style="display:none;">
  <div class="role-popup-card">
    <!-- 헤더 -->
    <div class="role-popup-header">
      <span class="role-popup-title">우리 반 1인1역</span>
      <button onclick="closeRolePopup()" class="role-popup-close">✕</button>
    </div>
    <!-- 스크롤 가능한 본문 -->
    <div class="role-popup-body" id="rolePopupContent">
      <!-- JS로 렌더링 -->
    </div>
    <!-- [6] 하단 버튼: 저장 / 초기화 / 취소 / 프린트 -->
    <div class="role-popup-footer">
      <button onclick="saveRoles()"        class="role-save-btn">💾 저장</button>
      <button onclick="resetAllRoles()"    class="role-reset-btn">🗑 초기화</button>
      <button onclick="closeRolePopup()"   class="role-cancel-btn">취소</button>
      <button onclick="printRoleTable()"   class="role-print-btn">🖨️ 프린트</button>
    </div>
  </div>
</div>

<!-- ===== [15~20] 다했어요 전용 타이머 패널 ===== -->
<div id="timerPanel" class="timer-panel hidden">
  <div class="timer-panel-inner">
    <div class="timer-label">⏱ 타이머</div>
    <div class="timer-circle-wrap">
      <svg class="timer-svg" viewBox="0 0 120 120">
        <circle class="timer-track" cx="60" cy="60" r="52"/>
        <circle id="timerArc" class="timer-arc" cx="60" cy="60" r="52"
          stroke-dasharray="326.7" stroke-dashoffset="0"/>
      </svg>
      <div class="timer-display">
        <span id="timerDigits" class="timer-digits">00:00</span>
      </div>
    </div>
    <div class="timer-add-row">
      <button onclick="timerAddTime(600,'timerPanel')" class="timer-add-btn">+10분</button>
      <button onclick="timerAddTime(300,'timerPanel')"  class="timer-add-btn">+5분</button>
      <button onclick="timerAddTime(60,'timerPanel')"   class="timer-add-btn">+1분</button>
      <button onclick="timerAddTime(30,'timerPanel')"   class="timer-add-btn">+30초</button>
      <button onclick="timerAddTime(10,'timerPanel')"   class="timer-add-btn">+10초</button>
    </div>
    <div class="timer-ctrl-row">
      <button onclick="timerStart('timerPanel')"  class="timer-ctrl-btn timer-ctrl-start"  title="시작">▶</button>
      <button onclick="timerPause('timerPanel')"  class="timer-ctrl-btn timer-ctrl-pause"  title="일시정지">⏸</button>
      <button onclick="timerReset('timerPanel')"  class="timer-ctrl-btn timer-ctrl-reset"  title="초기화">↺</button>
    </div>
  </div>
</div>

<!-- ===== 독립 타이머 패널 ===== -->
<div id="timerPanelFree" class="timer-panel timer-panel-free hidden">
  <div class="timer-panel-inner">
    <!-- [5] 닫기 버튼 추가 -->
    <div class="timer-panel-topbar">
      <span class="timer-label">⏱ 타이머</span>
      <button onclick="closeFreeTimer()" class="timer-close-btn" title="닫기">✕</button>
    </div>
    <div class="timer-circle-wrap">
      <svg class="timer-svg" viewBox="0 0 120 120">
        <circle class="timer-track" cx="60" cy="60" r="52"/>
        <circle id="timerArcFree" class="timer-arc" cx="60" cy="60" r="52"
          stroke-dasharray="326.7" stroke-dashoffset="0"/>
      </svg>
      <div class="timer-display">
        <span id="timerDigitsFree" class="timer-digits">00:00</span>
      </div>
    </div>
    <div class="timer-add-row">
      <button onclick="timerAddTime(600,'timerPanelFree')" class="timer-add-btn">+10분</button>
      <button onclick="timerAddTime(300,'timerPanelFree')"  class="timer-add-btn">+5분</button>
      <button onclick="timerAddTime(60,'timerPanelFree')"   class="timer-add-btn">+1분</button>
      <button onclick="timerAddTime(30,'timerPanelFree')"   class="timer-add-btn">+30초</button>
      <button onclick="timerAddTime(10,'timerPanelFree')"   class="timer-add-btn">+10초</button>
    </div>
    <div class="timer-ctrl-row">
      <button onclick="timerStart('timerPanelFree')"  class="timer-ctrl-btn timer-ctrl-start"  title="시작">▶</button>

</div>

<!-- ===== 다했어요 완료 오버레이 ===== -->
<div id="dahaesseoOverlay"
  style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5);
         z-index:9999; align-items:center; justify-content:center;">

    <div class="dahaesseo-emoji">🎉</div>
    <div class="dahaesseo-title">다 했어요!</div>

    <button onclick="closeDahaesseoOverlay()" class="dahaesseo-btn">확인</button>
  </div>
</div>

<!-- ===== 한번에 다 뽑기 결과 오버레이 ===== -->
<div id="pickAllPairsOverlay" class="pick-pairs-overlay" style="display:none;">

</div>

<!-- [v6-G] 매뉴얼 모달 -->
<div id="manualModal"
  style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.55);
         z-index:10001; align-items:center; justify-content:center;">
  <div style="background:#fff; border-radius:14px; padding:24px; width:340px;
              max-height:80vh; overflow-y:auto; box-shadow:0 8px 32px rgba(0,0,0,0.2);">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;">
      <span style="font-weight:900; font-size:16px;">📖 기능 도움말</span>
      <button onclick="closeManualModal()"
        style="background:none;border:none;font-size:18px;cursor:pointer;color:#64748b;">✕</button>

  </div>

<!-- 프린트 전용 영역 -->
<!-- [v9-I.2] 명단 입력 모달 -->
<div id="rosterInputModal"
  style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.55);
         z-index:10002; align-items:center; justify-content:center;">
  <div style="background:#fff; border-radius:14px; padding:24px; width:340px;
              max-height:80vh; overflow-y:auto; box-shadow:0 8px 32px rgba(0,0,0,0.2);">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
      <span style="font-weight:900; font-size:15px;">📝 학생 명단 입력</span>
      <button onclick="closeRosterInputModal()"
        style="background:none;border:none;font-size:18px;cursor:pointer;color:#64748b;">✕</button>
    </div>
    <textarea id="rosterInput" rows="8"
      style="width:100%;border:1px solid #e2e8f0;border-radius:8px;padding:8px;font-size:12px;
             resize:vertical;box-sizing:border-box;margin-bottom:10px;"
      placeholder="예) 홍길동, 서길동, 정길동, 김길동...&#10;(엑셀 이름 열을 드래그해 복붙 가능)&#10;※ 학생명단은 브라우저에만 저장됩니다."></textarea>
    <div style="display:flex;gap:8px;">
      <button onclick="loadRoster(rosterAppendMode); closeRosterInputModal();"
        style="flex:1;padding:9px;background:#34d399;color:#fff;border:none;border-radius:8px;
               font-weight:700;font-size:13px;cursor:pointer;">저장</button>
      <button onclick="closeRosterInputModal()"
        style="flex:1;padding:9px;background:#f1f5f9;color:#64748b;border:none;border-radius:8px;
               font-weight:700;font-size:13px;cursor:pointer;">닫기</button>
    </div>
  </div>
</div>

<!-- [v9-H.4] 커스텀 confirm 카드 — 우측하단 고정, 비블로킹 -->
<div id="customConfirm"
  style="display:none; position:fixed; bottom:16px; right:16px;
         background:#fff; border-radius:14px; padding:16px 18px;
         box-shadow:0 8px 32px rgba(0,0,0,0.18); z-index:11000;
         max-width:calc(100vw - 32px); min-width:220px;">
  <p id="ccMessage"
    style="font-size:14px; font-weight:700; color:#1e293b;
           margin:0 0 12px; line-height:1.5;"></p>
  <div style="display:flex; gap:8px; justify-content:flex-end;">
    <button id="ccNoBtn"
      style="padding:6px 14px; border-radius:8px; border:1px solid #e2e8f0;
             background:#f8fafc; font-size:13px; font-weight:600;
             color:#64748b; cursor:pointer;">
      저장 안 함
    </button>
    <button id="ccYesBtn"
      style="padding:6px 14px; border-radius:8px; border:none;
             background:#6366f1; font-size:13px; font-weight:700;
             color:#fff; cursor:pointer;">
      저장
    </button>
  </div>
</div>

<div id="printArea" class="hidden">
  <div class="print-board">칠 판</div>
  <div id="printGrid"></div>
</div>

<script src="script.js"></script>
  <!-- [V10-A] 오늘의 문구 이스터에그 팝업 -->
  <div id="quoteOverlay"
    style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:9999;align-items:center;justify-content:center;"
    onclick="closeQuotePopup()">
    <div id="quoteModal"
      style="background:#fff;border-radius:16px;padding:32px 28px 24px;
             max-width:340px;width:90%;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,.2);
             position:relative;"
      onclick="event.stopPropagation()">
      <div style="font-size:13px;color:#94a3b8;font-weight:600;letter-spacing:.05em;margin-bottom:14px;">오늘의 문구</div>
      <p id="quoteText"
        style="font-size:17px;color:#1e293b;font-weight:500;line-height:1.7;margin:0 0 20px;word-break:keep-all;"></p>
      <button onclick="closeQuotePopup()"
        style="background:#6366f1;color:#fff;border:none;border-radius:8px;
               padding:9px 24px;font-size:14px;font-weight:700;cursor:pointer;">닫기</button>
    </div>
  </div>
</body>
