<!doctype html>
<html lang="ko" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>스마트 자리 바꾸기</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght=400;500;700;900&display=swap');
body { font-family: 'Noto Sans KR', sans-serif; user-select: none; }
.slot-roll { animation: slotRoll 0.08s linear infinite; }
@keyframes slotRoll { 0%{transform:translateY(-100%);opacity:0} 50%{transform:translateY(0);opacity:1} 100%{transform:translateY(100%);opacity:0} }
.seat-pop { animation: seatPop 0.4s cubic-bezier(0.68,-0.55,0.27,1.55) forwards; }
@keyframes seatPop { from{transform:scale(0.5);opacity:0} to{transform:scale(1);opacity:1} }
.shake { animation: shake 0.1s linear infinite; }
@keyframes shake { 0%,100%{transform:translate(0)} 25%{transform:translate(-2px,1px)} 75%{transform:translate(2px,-1px)} }

.toggle-switch { width: 50px; height: 24px; background: #ef4444; border-radius: 12px; cursor: pointer; position: relative; transition: background 0.3s ease; border: none; padding: 0; display: inline-flex; align-items: center; }
.toggle-switch.active { background: #22c55e; }
.toggle-switch::after { content: ''; position: absolute; width: 20px; height: 20px; background: white; border-radius: 50%; left: 2px; transition: left 0.3s ease; }
.toggle-switch.active::after { left: 28px; }

.gender-switch { width: 54px; height: 24px; background: #3b82f6; border-radius: 6px; cursor: pointer; position: relative; border: none; padding: 0; color: white; font-size: 11px; font-weight: bold; display: inline-flex; align-items: center; justify-content: space-between; }
.gender-switch.female { background: #ec4899; }
.gender-switch::after { content: '남'; position: absolute; right: 6px; }
.gender-switch.female::after { content: '여'; left: 6px; }
.gender-switch-thumb { width: 18px; height: 18px; background: white; border-radius: 4px; position: absolute; left: 3px; transition: left 0.2s ease; }
.gender-switch.female .gender-switch-thumb { left: 33px; }

#grid { user-select: none; }
.grid-cell { position: relative; transition: all 0.3s ease; min-height: 60px; }
.seat-number { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 24px; font-weight: 900; color: #6366f1; pointer-events: none; text-shadow: 1px 1px 2px rgba(0,0,0,0.1); z-index: 10; }

/* 이번 회차 당첨 자리 (선명한 핑크색으로 내부 꽉 채움, 사이즈 확대 제거) */
.picked-cell-current { 
  background-color: #ec4899 !important; 
  border-color: #db2777 !important;     
  border-width: 3px !important;
  box-shadow: 0 10px 15px -3px rgba(236, 72, 153, 0.4);
  z-index: 30;
}
.picked-cell-current span, .picked-cell-current text {
  color: #ffffff !important;
}

/* 이전 회차 당첨 자리 (옅은 회색으로 채움, 모둠 테두리 가림) */
.picked-cell-previous {
  background-color: #e2e8f0 !important; /* Tailwind bg-slate-200 */
  border-color: #cbd5e1 !important;     /* 테두리도 회색 처리 */
  border-width: 2px !important;
  opacity: 0.8;
  z-index: 25;
}
.picked-cell-previous span {
  color: #64748b !important;            /* 글자색 톤다운 */
}
</style>
 </head>
 <body class="h-full bg-slate-100 overflow-hidden">
  <div class="flex h-full w-full">
   <div class="w-[70%] flex flex-col p-4 gap-3 relative">
    <button onclick="toggleSidebar()" class="absolute top-4 right-4 z-50 px-3 py-2 bg-indigo-400 hover:bg-indigo-500 text-white rounded-lg font-bold text-sm transition">메뉴</button> 
    <div class="bg-green-800 rounded-lg py-3 text-center shadow-inner border-4 border-yellow-900 relative">
     <span class="text-white text-2xl font-bold tracking-widest font-sans">칠 판</span>
    </div>

    <div id="grid" class="flex-1 grid grid-cols-8 grid-rows-5 gap-1.5 p-2 bg-slate-50 rounded-xl border border-slate-200"></div>
    
    <div class="flex justify-center gap-4 pb-2">
     <button id="btnOpenPicker" onclick="openPickerTab()" class="px-6 py-3 bg-amber-400 hover:bg-amber-500 text-white font-bold rounded-xl shadow-lg text-lg transition">📢 뽑기 메뉴</button>
     <button id="btnShuffle" onclick="startShuffle()" class="px-8 py-3 bg-indigo-400 hover:bg-indigo-500 text-white font-bold rounded-xl shadow-lg text-lg transition">🎲 자리 바꾸기</button> 
     <button onclick="resetGrid()" class="px-6 py-3 bg-rose-300 hover:bg-rose-400 text-white font-bold rounded-xl shadow-lg text-lg transition">↺ 자리 비우기</button>
    </div>
   </div>
   
   <div id="sidebar" class="w-[30%] bg-white border-l border-slate-200 flex flex-col transition-transform duration-300 fixed right-0 top-0 h-full z-40" style="transform: translateX(100%);">
    <div class="flex border-b">
     <button onclick="showTab('roster')" class="tab-btn flex-1 py-3 text-center text-lg hover:bg-slate-50 transition" data-tab="roster">👤</button> 
     <button onclick="showTab('group')" class="tab-btn flex-1 py-3 text-center text-lg hover:bg-slate-50 transition" data-tab="group">👥</button> 
     <button onclick="showTab('picker')" class="tab-btn flex-1 py-3 text-center text-lg hover:bg-slate-50 transition" data-tab="picker">📢</button>
     <button onclick="openSettingsWithPassword()" class="tab-btn flex-1 py-3 text-center text-lg hover:bg-slate-50 transition" data-tab="settings">⚙️</button>
    </div>
    <div class="flex-1 overflow-y-auto p-3" id="sideContent"></div>
   </div>
  </div>

  <script>
let students = []; 
let gridEnabled = Array(40).fill(true);
let currentSeats = Array(40).fill(null);
let previousSeats = Array(40).fill(null);
let groups = { count: 0, assignments: Array(40).fill(0) };
let activeGroup = 0;
let fixedSeats = {}; 
let banned = []; 
let avoidPrevPair = false;
let currentTab = 'roster';

// 설정 탭 비밀번호 보호
const SETTINGS_PASSWORD = '1234';

let savedLayouts = []; 

// 추첨 고도화 데이터 구조
let pickedSeatIndexes = [];      // 이번 회차에 당첨된 자리 인덱스
let historyPickedNames = [];     // 누적으로 뽑혔던 학생들의 이름 저장 배열
let excludePickedEnabled = true; // 뽑힌 사람 제외 기능 토글 상태 (기본값 ON)

// [추가] 뽑기 메뉴 숫자 유지용 변수
let lastPickAllCount = 1;
let lastPickGroupCount = 1;
let lastPickMaleCount = 0;
let lastPickFemaleCount = 0;


let isDragging = false;
let startCellState = null;
const groupColors = ['#93c5fd','#f8a5d8','#fde68a','#c084fc','#86efac','#fca5a5','#fed7aa','#e9d5ff'];

function loadFromStorage() {
  try {
    const storedStudents = localStorage.getItem('seat_students');
    if (storedStudents) {
      const parsed = JSON.parse(storedStudents);
      if (Array.isArray(parsed)) {
        students = parsed.map(s => {
          if(!s || typeof s !== 'object') return null;
          return { name: s.name || '무명', milk: !!s.milk, gender: s.gender || 'M' };
        }).filter(Boolean);
      }
    }
  } catch(e) { students = []; }

  try {
    const storedGrid = localStorage.getItem('seat_grid_enabled');
    if (storedGrid) {
      const parsed = JSON.parse(storedGrid);
      if (Array.isArray(parsed) && parsed.length === 40) gridEnabled = parsed;
    }
  } catch(e) { gridEnabled = Array(40).fill(true); }

  try { const storedGroups = localStorage.getItem('seat_groups'); if (storedGroups) groups = JSON.parse(storedGroups); } catch(e){}
  try { const storedFixed = localStorage.getItem('seat_fixed_seats'); if (storedFixed) fixedSeats = JSON.parse(storedFixed); } catch(e){}
  try { const storedBanned = localStorage.getItem('seat_banned'); if (storedBanned) banned = JSON.parse(storedBanned); } catch(e){}
  try { const storedLayouts = localStorage.getItem('seat_layouts'); if (storedLayouts) savedLayouts = JSON.parse(storedLayouts) || []; } catch(e){}
}

function saveStudentsToStorage() { localStorage.setItem('seat_students', JSON.stringify(students)); }
function saveSettingsToStorage() {
  localStorage.setItem('seat_grid_enabled', JSON.stringify(gridEnabled));
  localStorage.setItem('seat_groups', JSON.stringify(groups));
  localStorage.setItem('seat_fixed_seats', JSON.stringify(fixedSeats));
  localStorage.setItem('seat_banned', JSON.stringify(banned));
}

// 1) 명칭 변경 및 톱니바퀴 하단으로 수납된 전면 초기화 로직
function clearAllData() {
  if(confirm("스토리지에 저장된 모든 데이터(명단, 배치 역사 기록 포함)를 삭제하고 원천 초기화하시겠습니까?")) {
    localStorage.clear();
    location.reload();
  }
}

function resetGroupSettings() {
  if(confirm("모든 모둠 설정을 초기화하고 처음 상태로 되돌리시겠습니까?")) {
    groups = { count: 0, assignments: Array(40).fill(0) };
    activeGroup = 0;
    saveSettingsToStorage();
    renderSide();
    renderGrid();
  }
}

// 뽑기 연출 및 누적 기록 완전 초기화 기능 구현
function resetPickerEffects() {
  pickedSeatIndexes = [];
  historyPickedNames = [];
  renderGrid();
  renderSide(); // 추첨 메뉴의 가용 인원 갱신을 위해 사이드바 리렌더링
}

function renderGrid(){
  const g = document.getElementById('grid');
  if(!g) return;
  g.innerHTML = '';
  
  for(let i=0;i<40;i++){
    const isCurrentPicked = pickedSeatIndexes.includes(i);
    let isPreviousPicked = false;
    
    // 현재 회차에 뽑히지 않았다면, 과거 회차 명단에 속해있는지 검증
    if(!isCurrentPicked && currentSeats[i] && historyPickedNames.includes(currentSeats[i].name)) {
      isPreviousPicked = true;
    }

    const cell = document.createElement('div');
    
    // 조건에 따른 알맞은 배경 색상 클래스 부여
    let cellClass = `grid-cell relative flex items-center justify-center rounded-lg border-2 cursor-pointer transition-all `;
    if (isCurrentPicked) {
      cellClass += 'picked-cell-current';
    } else if (isPreviousPicked) {
      cellClass += 'picked-cell-previous';
    } else {
      cellClass += gridEnabled[i] ? 'bg-white border-slate-300 hover:border-indigo-300' : 'bg-slate-200 border-slate-200 opacity-50';
    }
    cell.className = cellClass;
    cell.dataset.idx = i;
    
    if(typeof fixModeActive !== 'undefined' && fixModeActive){
      const seatNum = document.createElement('span');
      seatNum.className = 'seat-number';
      seatNum.textContent = i + 1;
      cell.appendChild(seatNum);
    }
    
    // 당첨 기록이 전혀 없는 순수 자리에만 모둠 테두리선 부여
    if(!isCurrentPicked && !isPreviousPicked && groups && groups.assignments && groups.assignments[i]>0){
      cell.style.borderColor = groupColors[(groups.assignments[i]-1)%8];
      cell.style.borderWidth = '3px';
    }
    
    if(currentSeats && currentSeats[i]){
      const s = currentSeats[i];
      const inner = document.createElement('div');
      inner.className = 'flex items-center gap-1 z-20';
      
      const dotColor = s.gender === 'F' ? 'bg-pink-400' : 'bg-blue-400';
      
      // 이번 회차 당첨자는 크게 흰색 글씨, 이전 회차는 톤다운 처리
      let textClass = 'text-base font-semibold text-slate-800';
      if(isCurrentPicked) textClass = 'text-lg font-black text-white';
      else if(isPreviousPicked) textClass = 'text-base font-bold text-slate-500';

      inner.innerHTML = `
        <span class="${textClass} whitespace-nowrap">${s.name}</span>
        ${(isCurrentPicked || isPreviousPicked) ? '' : `<span class="w-1.5 h-1.5 rounded-full ${dotColor}"></span>`}
        ${s.milk?milkSVG(isCurrentPicked, isPreviousPicked):''}`;
      cell.appendChild(inner);
    }
    
    // 당첨 기록이 전혀 없을 때만 모둠 번호 라벨 표시
    if(!isCurrentPicked && !isPreviousPicked && groups && groups.assignments && groups.assignments[i]>0){
      const gn = document.createElement('span');
      gn.className = 'absolute top-0 left-1 text-xs font-bold opacity-60 z-20';
      gn.textContent = `${groups.assignments[i]}모둠`;
      cell.appendChild(gn);
    }
    
    cell.addEventListener('mousedown', (e) => handleMouseDown(i, e));
    cell.addEventListener('mouseenter', (e) => handleMouseEnter(i, e));
    g.appendChild(cell);
  }
}

window.addEventListener('mouseup', () => {
  if (isDragging) { isDragging = false; startCellState = null; saveSettingsToStorage(); }
});

function handleMouseDown(i, e) {
  e.preventDefault();
  if (typeof fixModeActive !== 'undefined' && fixModeActive) {
    if (fixModeStudentIdx !== null) {
      fixedSeats[fixModeStudentIdx] = i; fixModeActive = false; fixModeStudentIdx = null;
      saveSettingsToStorage(); renderSide(); renderGrid();
    }
    return;
  }
  isDragging = true;
  if (activeGroup > 0) {
    startCellState = groups.assignments[i] === activeGroup ? 0 : activeGroup;
    groups.assignments[i] = startCellState;
  } else {
    startCellState = !gridEnabled[i]; gridEnabled[i] = startCellState;
  }
  renderGrid();
}

function handleMouseEnter(i, e) {
  if (!isDragging || (typeof fixModeActive !== 'undefined' && fixModeActive)) return;
  if (activeGroup > 0) groups.assignments[i] = startCellState;
  else gridEnabled[i] = startCellState;
  renderGrid();
}

function milkSVG(isCurrentPicked, isPreviousPicked){ 
  let strokeColor = '#3b82f6'; let fillColor = '#bfdbfe'; let textColor = '#1e40af';
  if(isCurrentPicked) { strokeColor = '#ffffff'; fillColor = 'rgba(255,255,255,0.2)'; textColor = '#ffffff'; }
  else if(isPreviousPicked) { strokeColor = '#94a3b8'; fillColor = '#cbd5e1'; textColor = '#64748b'; }
  return `<svg width="16" height="20" viewBox="0 0 16 20" class="flex-shrink-0"><rect x="3" y="7" width="10" height="12" rx="1" fill="#fff" stroke="${strokeColor}" stroke-width="1.5"/><polygon points="5,7 8,3 11,7" fill="#fff" stroke="${strokeColor}" stroke-width="1.5" stroke-linejoin="round"/><rect x="5" y="9" width="6" height="4" rx="0.5" fill="${fillColor}"/><text x="8" y="12" text-anchor="middle" font-size="3.5" fill="${textColor}" font-weight="bold">우유</text></svg>`; 
}

function startShuffle(){
  if(students.length===0) return;
  pickedSeatIndexes = []; // 자리 배치 섞을 시 기존 이번 회차 핑크색 임시 클리어
  const btn = document.getElementById('btnShuffle');
  btn.disabled = true; btn.classList.add('opacity-50');
  const cells = document.getElementById('grid').children;
  const enabled = [];
  for(let i=0;i<40;i++) if(gridEnabled[i]) enabled.push(i);

  let rollInterval = setInterval(()=>{
    for(let idx of enabled){
      const cell = cells[idx];
      if(!cell) continue;
      const rnd = students[Math.floor(Math.random()*students.length)];
      cell.innerHTML = `<span class="text-base font-semibold slot-roll text-slate-800">${rnd.name}</span>`;
      cell.classList.add('shake');
    }
  },80);

  setTimeout(()=>{
    clearInterval(rollInterval);
    for(let idx of enabled) { if(cells[idx]) cells[idx].classList.remove('shake'); }
    doShuffle();
    btn.disabled = false; btn.classList.remove('opacity-50');
    fireConfetti();
  },3000);
}

function fireConfetti(){
  const dur = 1500; const end = Date.now()+dur;
  (function frame(){
    confetti({particleCount:4,angle:60,spread:55,origin:{x:0},colors:['#a7f3d0','#bfdbfe','#fde68a']});
    confetti({particleCount:4,angle:120,spread:55,origin:{x:1},colors:['#fca5a5','#99f6e4','#fed7aa']});
    if(Date.now()<end) requestAnimationFrame(frame);
  })();
}

function doShuffle(){
  previousSeats = [...currentSeats]; currentSeats = Array(40).fill(null);
  const enabled = [];
  for(let i=0;i<40;i++) if(gridEnabled[i]) enabled.push(i);
  let pool = [...students]; let slots = [...enabled];

  for(let si in fixedSeats){
    const seatIdx = fixedSeats[si];
    if(gridEnabled[seatIdx]){ currentSeats[seatIdx] = students[si]; pool = pool.filter(s=>s!==students[si]); slots = slots.filter(s=>s!==seatIdx); }
  }

  let prevPairs = new Set();
  if(avoidPrevPair){
    for(let i=0;i<40;i++){
      if(!previousSeats[i]) continue;
      const col=i%8;
      if(col>0 && previousSeats[i-1]) prevPairs.add(previousSeats[i].name+'|'+previousSeats[i-1].name);
      if(col<7 && previousSeats[i+1]) prevPairs.add(previousSeats[i].name+'|'+previousSeats[i+1].name);
    }
  }

  for(let attempt=0;attempt<100;attempt++){
    let tempPool = [...pool]; let tempSlots = [...slots]; let tempSeats = [...currentSeats];
    shuffle(tempPool); let valid = true;
    for(let k=0;k<Math.min(tempPool.length,tempSlots.length);k++) tempSeats[tempSlots[k]] = tempPool[k];

    for(let [a,b] of banned){
      for(let i=0;i<40;i++){
        if(!tempSeats[i]) continue;
        const col=i%8;
        if(tempSeats[i]===students[a]){
          if(col>0&&tempSeats[i-1]===students[b]) valid=false;
          if(col<7&&tempSeats[i+1]===students[b]) valid=false;
        }
      }
    }
    if(avoidPrevPair && valid){
      for(let i=0;i<40;i++){
        if(!tempSeats[i]) continue;
        const col=i%8;
        if(col>0&&tempSeats[i-1] && prevPairs.has(tempSeats[i].name+'|'+tempSeats[i-1].name)) valid=false;
        if(col<7&&tempSeats[i+1] && prevPairs.has(tempSeats[i].name+'|'+tempSeats[i+1].name)) valid=false;
      }
    }
    if(valid||attempt===99){ currentSeats=tempSeats; break; }
  }
  renderGrid();
  const cells = document.getElementById('grid').children;
  for(let i=0;i<40;i++) if(currentSeats[i] && cells[i]) setTimeout(()=>cells[i].classList.add('seat-pop'), i*30);
}

function shuffle(arr){for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}}
function resetGrid(){ currentSeats = Array(40).fill(null); pickedSeatIndexes = []; renderGrid(); }

function showTab(tab){
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('border-b-2','border-indigo-500','text-indigo-600'));
  const targetBtn = document.querySelector(`[data-tab="${tab}"]`);
  if(targetBtn) targetBtn.classList.add('border-b-2','border-indigo-500','text-indigo-600');
  renderSide();
}
function toggleSidebar(){
  const sidebar = document.getElementById('sidebar');
  if(!sidebar) return;
  const isHidden = sidebar.style.transform==='translateX(100%)' || sidebar.style.transform==='';
  sidebar.style.transform = isHidden ? 'translateX(0)' : 'translateX(100%)';
}
function openPickerTab() { const sb = document.getElementById('sidebar'); if(sb) sb.style.transform = 'translateX(0)'; showTab('picker'); }

function openSettingsWithPassword(){
  const input = prompt('설정 메뉴 비밀번호 4자리를 입력하세요.');

  if(input === null) return;

  if(input === SETTINGS_PASSWORD){
    showTab('settings');
  } else {
    alert('비밀번호가 올바르지 않습니다.');
  }
}


function renderSide(){
  const c = document.getElementById('sideContent'); 
  if(!c) return;

  // 입력값 유지
  const elAll = document.getElementById('pickAllCount');
  if(elAll) lastPickAllCount = parseInt(elAll.value)||1;

  const elGrp = document.getElementById('pickGroupCount');
  if(elGrp) lastPickGroupCount = parseInt(elGrp.value)||1;

  const elMale = document.getElementById('pickMaleCount');
  if(elMale) lastPickMaleCount = parseInt(elMale.value)||0;

  const elFemale = document.getElementById('pickFemaleCount');
  if(elFemale) lastPickFemaleCount = parseInt(elFemale.value)||0;

  if(currentTab==='roster') renderRoster(c);
  else if(currentTab==='group') renderGroup(c);
  else if(currentTab==='settings') renderSettings(c);
  else renderPickerMenu(c);
}

function renderRoster(c){
  c.innerHTML = `
    <textarea id="rosterInput" class="w-full h-24 border rounded-lg p-2 text-sm mb-2" placeholder="이름을 줄바꿈으로 입력\n(우유급식: 이름 뒤에 탭+O)"></textarea>
    <div class="flex gap-2 mb-3">
      <button onclick="loadRoster(false)" class="flex-1 py-2 bg-emerald-400 text-white rounded-lg font-bold text-sm hover:bg-emerald-500">명단 등록</button>
      <button onclick="loadRoster(true)" class="flex-1 py-2 bg-sky-400 text-white rounded-lg font-bold text-sm hover:bg-sky-500">명단 추가</button>
    </div>
    <table class="w-full text-xs border-collapse">
      <tr class="bg-slate-100"><th class="p-1 border">#</th><th class="p-1 border">이름</th><th class="p-1 border">성별</th><th class="p-1 border">우유</th><th class="p-1 border">삭제</th></tr>
      ${students.map((s,i)=>`
        <tr class="hover:bg-slate-50">
          <td class="p-1 border text-center text-slate-400">${i+1}</td>
          <td class="p-1 border font-medium">${s?s.name:''}</td>
          <td class="p-1 border text-center"><button class="gender-switch ${s&&s.gender==='F'?'female':''}" onclick="toggleGender(${i})"><span class="gender-switch-thumb"></span></button></td>
          <td class="p-1 border text-center"><button class="toggle-switch ${s&&s.milk?'active':''}" onclick="toggleMilk(${i})"></button></td>
          <td class="p-1 border text-center"><button onclick="removeStudent(${i})" class="text-red-400 hover:text-red-600">✕</button></td>
        </tr>`).join('')}
    </table>`;
}

function loadRoster(append){
  const txt = document.getElementById('rosterInput').value.trim(); if(!txt) return;
  const lines = txt.split('\n').filter(l=>l.trim());
  const newS = lines.map(l=>{ const parts = l.split(/\t/); return { name: parts[0].trim(), milk: parts[1] && parts[1].trim().toUpperCase()==='O', gender: 'M' }; });
  if(append) students = [...students,...newS]; else students = newS;
  saveStudentsToStorage(); renderSide(); renderGrid();
}
function toggleMilk(i){ if(students[i]) students[i].milk=!students[i].milk; saveStudentsToStorage(); renderSide(); renderGrid(); }
function toggleGender(i){ if(students[i]) students[i].gender = students[i].gender === 'M' ? 'F' : 'M'; saveStudentsToStorage(); renderSide(); renderGrid(); }
function removeStudent(i){ students.splice(i,1); delete fixedSeats[i]; saveStudentsToStorage(); saveSettingsToStorage(); renderSide(); renderGrid(); }

function setGroups(){ groups.count = parseInt(document.getElementById('groupCount').value)||0; groups.assignments = Array(40).fill(0); activeGroup = 0; saveSettingsToStorage(); renderSide(); renderGrid(); }

function activateFixMode(){
  const si = document.getElementById('fixStudent').value;
  if(si === ''){ fixModeActive = false; fixModeStudentIdx = null; document.getElementById('fixModeStatus').style.display = 'none'; renderGrid(); return; }
  fixModeActive = true; fixModeStudentIdx = parseInt(si); document.getElementById('fixModeStatus').style.display = 'block'; renderGrid();
}
function removeFix(si){ delete fixedSeats[si]; saveSettingsToStorage(); renderSide(); renderGrid(); }
function addBan(){
  const a=parseInt(document.getElementById('banA').value), b=parseInt(document.getElementById('banB').value);
  if(!isNaN(a) && !isNaN(b) && a!==b) banned.push([a,b]);
  saveSettingsToStorage(); renderSide();
}
function removeBan(i){ banned.splice(i,1); saveSettingsToStorage(); renderSide(); }
function saveCurrentLayout() {
  if (currentSeats.every(seat => seat === null)) { alert("배치된 자리가 없어 저장할 수 없습니다."); return; }
  const now = new Date(); const formattedDate = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')} ${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;
  const newLayout = { id: Date.now(), date: formattedDate, seats: [...currentSeats], gridEnabled: [...gridEnabled], groups: JSON.parse(JSON.stringify(groups)), fixedSeats: JSON.parse(JSON.stringify(fixedSeats)), banned: [...banned] };
  savedLayouts.unshift(newLayout); localStorage.setItem('seat_layouts', JSON.stringify(savedLayouts)); renderSide();
}
function renderHistoryList() {
  if (!savedLayouts || savedLayouts.length === 0) return '<span class="text-xs text-slate-400 text-center py-2">저장된 기록이 없습니다.</span>';
  return savedLayouts.map((layout) => `
    <div class="flex items-center justify-between border rounded p-1.5 bg-slate-50 hover:bg-slate-100 transition text-xs">
      <button onclick="loadLayout(${layout.id})" class="text-left font-medium text-slate-700 flex-1 truncate mr-2">📅 ${layout.date}</button>
      <button onclick="deleteLayout(${layout.id}, event)" class="text-rose-400 hover:text-rose-600 font-bold px-1">✕</button>
    </div>`).join('');
}
function loadLayout(id) {
  const target = savedLayouts.find(l => l.id === id); if (!target) return;
  if (confirm(`${target.date}의 배치로 복원하시겠습니까?`)) {
    previousSeats = [...currentSeats]; currentSeats = [...target.seats]; gridEnabled = [...target.gridEnabled]; groups = JSON.parse(JSON.stringify(target.groups)); fixedSeats = JSON.parse(JSON.stringify(target.fixedSeats)); banned = [...target.banned];
    saveSettingsToStorage(); resetPickerEffects();
  }
}
function deleteLayout(id, event) { event.stopPropagation(); if (confirm("삭제하시겠습니까?")) { savedLayouts = savedLayouts.filter(l => l.id !== id); localStorage.setItem('seat_layouts', JSON.stringify(savedLayouts)); renderSide(); } }

// 2) 신규 다회차 연출 프로세스 제어 핵심 함수
function highlightPickedSeats(pickedNames) {
  if (!pickedNames || pickedNames.length === 0) { alert("조건에 부합하는 대상 학생이 없습니다."); return; }
  
  // 1. 새 추첨 실행 시 기존 1회차 핑크색이었던 명단을 통째로 누적 기록(이전 회차)으로 이관
  const prevCurrentSeats = pickedSeatIndexes.map(idx => currentSeats[idx]?.name).filter(Boolean);
  prevCurrentSeats.forEach(name => {
    if (!historyPickedNames.includes(name)) historyPickedNames.push(name);
  });

  // 2. 현재 회차 명단 완전히 초기화 후 새 명단 수집
  pickedSeatIndexes = [];
  pickedNames.forEach(name => {
    for (let i = 0; i < 40; i++) {
      if (currentSeats && currentSeats[i] && currentSeats[i].name === name) { 
        pickedSeatIndexes.push(i); 
      }
    }
  });

  // 3. 그리드 리렌더링 및 우측 스크린 가용 인원 숫자 반영을 위한 갱신
  renderGrid();
  renderSide();
  confetti({ particleCount: 40, spread: 60, origin: { y: 0.6 } });
}

// 추첨 집단 필터링 전처리기 함수 (제외 옵션 동작용)
function getFilteredPool(sourceArray) {
  if (!excludePickedEnabled) return [...sourceArray];

  // 이전 회차 당첨자
  const excludedNames = new Set(historyPickedNames);

  // 현재 회차(핑크색 표시 중) 당첨자도 제외 대상에 포함
  pickedSeatIndexes.forEach(idx => {
    if (currentSeats[idx] && currentSeats[idx].name) {
      excludedNames.add(currentSeats[idx].name);
    }
  });

  // 제외 대상이 아닌 학생만 반환
  return sourceArray.filter(name => !excludedNames.has(name));
}

function pickFromAll() {
  // 현재 화면 자리에 배치되어 있는 학생들만 풀로 구축
  const activeNames = currentSeats.filter(Boolean).map(s => s.name);
  if (activeNames.length === 0) return alert("배치된 명단이 없습니다. 자리 바꾸기를 먼저 해주세요.");
  
  let pool = getFilteredPool(activeNames);
  const count = parseInt(document.getElementById('pickAllCount').value) || 0;
  if (count <= 0) return;
  if (pool.length === 0) return alert("추첨 가능한 모든 학생이 이미 발표했습니다.");

  shuffle(pool); 
  highlightPickedSeats(pool.slice(0, Math.min(count, pool.length)));
}

function pickFromGroups() {
  if (!groups || groups.count === 0) return alert("모둠이 설정되어 있지 않습니다.");
  const count = parseInt(document.getElementById('pickGroupCount').value) || 0;
  if (count <= 0) return;
  
  let groupMap = {};
  for(let i=1; i<=groups.count; i++) groupMap[i] = [];
  for(let i=0; i<40; i++) {
    if (groups.assignments && groups.assignments[i] > 0 && currentSeats && currentSeats[i]) { 
      groupMap[groups.assignments[i]].push(currentSeats[i].name); 
    }
  }
  
  let finalPicked = [];
  let hasAvailableStudent = false;

  for(let gNum = 1; gNum <= groups.count; gNum++) {
    let pool = groupMap[gNum];
    if (pool && pool.length > 0) { 
      pool = getFilteredPool(pool);
      if (pool.length > 0) {
        hasAvailableStudent = true;
        shuffle(pool); 
        finalPicked = finalPicked.concat(pool.slice(0, Math.min(count, pool.length))); 
      }
    }
  }
  
  if (!hasAvailableStudent) return alert("추첨 가능한 모든 모둠원이 이미 발표했습니다.");
  highlightPickedSeats(finalPicked);
}

function pickFromGender() {
  const activeStudents = currentSeats.filter(Boolean);
  if (activeStudents.length === 0) return alert("배치된 명단이 없습니다. 자리 바꾸기를 먼저 해주세요.");

  const mCount = parseInt(document.getElementById('pickMaleCount').value) || 0;
  const fCount = parseInt(document.getElementById('pickFemaleCount').value) || 0;
  
  let males = activeStudents.filter(s => s.gender === 'M').map(s => s.name);
  let females = activeStudents.filter(s => s.gender === 'F').map(s => s.name);
  
  males = getFilteredPool(males);
  females = getFilteredPool(females);
  
  if (males.length === 0 && mCount > 0) alert("남학생 중 추첨 가능한 인원이 없습니다.");
  if (females.length === 0 && fCount > 0) alert("여학생 중 추첨 가능한 인원이 없습니다.");

  shuffle(males); shuffle(females);
  let finalPicked = [];
  finalPicked = finalPicked.concat(males.slice(0, Math.min(mCount, males.length)));
  finalPicked = finalPicked.concat(females.slice(0, Math.min(fCount, females.length)));
  
  highlightPickedSeats(finalPicked);
}
